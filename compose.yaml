services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: loete
      POSTGRES_USER: loete
      POSTGRES_PASSWORD: loete
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loete"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    profiles: ["deploy"]
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/loete
      DATABASE_USERNAME: loete
      DATABASE_PASSWORD: loete
      JWT_SECRET: dev-secret-key-change-in-production-must-be-long-enough-for-hs512
      CORS_ORIGINS: http://localhost:4200
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    profiles: ["deploy"]
    ports:
      - "4200:4000"
    depends_on:
      - backend

volumes:
  pgdata:
