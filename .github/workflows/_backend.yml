name: Backend quality

on:
  workflow_call:

jobs:
  checks:
    name: Backend (spotless / checkstyle / tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      MAVEN_OPTS: "-Dorg.slf4j.simpleLogger.showDateTime=true -Dorg.slf4j.simpleLogger.dateTimeFormat=HH:mm:ss.SSS"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Format check
        run: ./mvnw --batch-mode --no-transfer-progress spotless:check

      - name: Lint
        run: ./mvnw --batch-mode --no-transfer-progress checkstyle:check

      - name: Tests
        run: ./mvnw --batch-mode --no-transfer-progress -T 1C test
