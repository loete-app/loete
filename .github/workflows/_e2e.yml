name: E2E tests

on:
  workflow_call:

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          package_json_file: frontend/package.json

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Start services
        run: docker compose up -d postgres && sleep 5

      - name: Start backend
        working-directory: backend
        run: ./mvnw spring-boot:run -Dspring-boot.run.profiles=dev &
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/loete
          DATABASE_USERNAME: loete
          DATABASE_PASSWORD: loete
          CORS_ORIGINS: http://localhost:4200
          SPRING_DOCKER_COMPOSE_ENABLED: "false"

      - name: Wait for backend
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/api/actuator/health && break
            sleep 2
          done

      - name: Run E2E tests
        working-directory: frontend
        run: pnpm exec playwright test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
