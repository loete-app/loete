spring:
  application:
    name: loete-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/loete}
    username: ${DATABASE_USERNAME:loete}
    password: ${DATABASE_PASSWORD:loete}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  docker:
    compose:
      file: ../compose.yaml
      lifecycle-management: start-only

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

app:
  jwt:
    # DEV ONLY – production MUST set JWT_SECRET env var
    secret: ${JWT_SECRET:default-dev-secret-that-is-at-least-64-bytes-long-for-hs512-algorithm-xxxx}
    access-expiration-ms: ${JWT_ACCESS_EXPIRATION:900000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION:604800000}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:4200}
  ticketmaster:
    api-key: ${TICKETMASTER_API_KEY:}
    base-url: https://app.ticketmaster.com/discovery/v2
  embeddings:
    base-url: ${EMBEDDINGS_BASE_URL:https://openrouter.ai/api/v1}
    api-key: ${EMBEDDINGS_API_KEY:}
    model: ${EMBEDDINGS_MODEL:openai/text-embedding-3-small}
  vibe-search:
    enabled: ${VIBE_SEARCH_ENABLED:true}
    similarity-threshold: 0.65
    embedding-batch-size: 50
    default-limit: 20

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
