name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

# Reusable workflows can only request permissions the caller already has.
# Grant the union here; each reusable workflow narrows it to what it actually needs.
permissions:
  contents: read
  id-token: write
  pull-requests: read
  security-events: write
  actions: read
  attestations: write

jobs:
  # ── Quality gates ────────────────────────────────────────────────────
  frontend:
    uses: ./.github/workflows/_frontend.yml

  backend:
    uses: ./.github/workflows/_backend.yml

  sonar:
    uses: ./.github/workflows/_sonar.yml
    secrets: inherit

  infra-check:
    uses: ./.github/workflows/_infra.yml
    with:
      mode: check
    secrets: inherit

  # ── Security: shift-left ─────────────────────────────────────────────
  security-static:
    uses: ./.github/workflows/_security-static.yml
    secrets: inherit

  e2e:
    needs: [frontend, backend]
    uses: ./.github/workflows/_e2e.yml

  # ── Build & push images ──────────────────────────────────────────────
  build:
    needs: [frontend, backend, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: ./.github/workflows/_build.yml
    with:
      region: europe-west1
      ar_repo: loete
      backend_service: loete-backend
    secrets: inherit

  # ── Security: built images ──────────────────────────────────────────
  security-images:
    needs: build
    uses: ./.github/workflows/_security-images.yml
    with:
      region: europe-west1
      ar_repo: loete
    secrets: inherit

  # ── Migrate → deploy → infra apply ──────────────────────────────────
  migrate:
    needs: build
    uses: ./.github/workflows/_migrate.yml
    secrets: inherit

  deploy:
    needs: migrate
    uses: ./.github/workflows/_deploy.yml
    with:
      region: europe-west1
      ar_repo: loete
      backend_service: loete-backend
      frontend_service: loete-frontend
    secrets: inherit

  infra-apply:
    needs: [deploy, infra-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: ./.github/workflows/_infra.yml
    with:
      mode: apply
    secrets: inherit
