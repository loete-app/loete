name: SonarCloud analysis

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  pull-requests: read

jobs:
  Analysis:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Compile backend
        run: cd backend && ./mvnw -B -DskipTests compile

      - name: Analyze with SonarCloud
        uses: SonarSource/sonarcloud-github-action@4006f663ecaf1f8093e8e4abb9227f6041f52216 # v2.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=loete-app_loete
            -Dsonar.organization=loete-app
            -Dsonar.sources=backend/src/main/java,frontend/src
            -Dsonar.tests=backend/src/test/java
            -Dsonar.test.inclusions=**/*Test.java,**/*Tests.java,**/*.spec.ts
            -Dsonar.java.binaries=backend/target/classes
            -Dsonar.java.source=25
            -Dsonar.exclusions=**/node_modules/**,**/target/**,**/dist/**,**/.angular/**,frontend/pnpm-lock.yaml
            -Dsonar.typescript.tsconfigPaths=frontend/tsconfig.json,frontend/tsconfig.app.json
          projectBaseDir: .
