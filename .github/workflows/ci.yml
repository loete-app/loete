name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGION: europe-west1
  BACKEND_SERVICE: loete-backend
  FRONTEND_SERVICE: loete-frontend
  AR_REPO: loete

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Frontend format check
        working-directory: frontend
        run: pnpm exec prettier --check "src/**/*.{ts,html,scss,json}"

      - name: Frontend lint
        working-directory: frontend
        run: pnpm exec ng lint

      - name: Frontend typecheck
        working-directory: frontend
        run: pnpm exec tsc --noEmit -p tsconfig.app.json

      - name: Frontend tests
        working-directory: frontend
        run: pnpm test -- --run

      - name: Backend format check
        working-directory: backend
        run: ./mvnw --batch-mode spotless:check

      - name: Backend lint
        working-directory: backend
        run: ./mvnw --batch-mode checkstyle:check

      - name: Backend tests
        working-directory: backend
        run: ./mvnw --batch-mode test

  infra-checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.8"

      - name: Tofu fmt check
        working-directory: infra
        run: tofu fmt -check -recursive

      - name: Tofu init
        working-directory: infra
        run: tofu init

      - name: Tofu validate
        working-directory: infra
        run: tofu validate

      - name: Tofu plan
        if: github.event_name == 'pull_request'
        working-directory: infra
        run: tofu plan -var-file=production.tfvars

  build-push:
    needs: checks
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      backend_url: ${{ steps.backend-url.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "$REGION-docker.pkg.dev" --quiet

      - name: Resolve backend Cloud Run URL
        id: backend-url
        env:
          SERVICE: ${{ env.BACKEND_SERVICE }}
        run: |
          URL=$(gcloud run services describe "$SERVICE" \
            --region "$REGION" \
            --format 'value(status.url)' \
            2>/dev/null || echo "")
          if [ -z "$URL" ]; then
            echo "Backend service does not yet exist; building frontend with placeholder API_URL."
            echo "url=http://localhost:8080/api" >> "$GITHUB_OUTPUT"
          else
            echo "url=${URL}/api" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push backend image
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          COMMIT_SHA: ${{ github.sha }}
        working-directory: backend
        run: |
          IMAGE_BASE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPO}/backend"
          docker build \
            -t "${IMAGE_BASE}:${COMMIT_SHA}" \
            -t "${IMAGE_BASE}:latest" .
          docker push --all-tags "${IMAGE_BASE}"

      - name: Build and push frontend image
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          COMMIT_SHA: ${{ github.sha }}
          API_URL: ${{ steps.backend-url.outputs.url }}
        working-directory: frontend
        run: |
          IMAGE_BASE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPO}/frontend"
          docker build \
            --build-arg "API_URL=${API_URL}" \
            -t "${IMAGE_BASE}:${COMMIT_SHA}" \
            -t "${IMAGE_BASE}:latest" .
          docker push --all-tags "${IMAGE_BASE}"

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy backend
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.BACKEND_SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/backend:${{ github.sha }}

      - name: Deploy frontend
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.FRONTEND_SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/frontend:${{ github.sha }}

      - name: Verify backend health
        env:
          SERVICE: ${{ env.BACKEND_SERVICE }}
        run: |
          URL=$(gcloud run services describe "$SERVICE" --region "$REGION" --format 'value(status.url)')
          echo "Probing $URL/api/actuator/health"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' "$URL/api/actuator/health" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Backend health OK"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying..."
            sleep 5
          done
          echo "Backend health check failed"
          exit 1

      - name: Verify frontend health
        env:
          SERVICE: ${{ env.FRONTEND_SERVICE }}
        run: |
          URL=$(gcloud run services describe "$SERVICE" --region "$REGION" --format 'value(status.url)')
          echo "Probing $URL"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' "$URL" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Frontend health OK"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying..."
            sleep 5
          done
          echo "Frontend health check failed"
          exit 1

  infra:
    needs: [deploy, infra-checks]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.8"

      - name: Tofu init
        working-directory: infra
        run: tofu init

      - name: Tofu apply
        working-directory: infra
        run: tofu apply -auto-approve -var-file=production.tfvars
