name: Frontend quality

on:
  workflow_call:

jobs:
  checks:
    name: Frontend (lint / format / typecheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          package_json_file: frontend/package.json

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm exec prettier --check "src/**/*.{ts,html,scss,json}"

      - name: Lint
        run: pnpm exec ng lint

      - name: Typecheck
        run: pnpm exec tsc --noEmit -p tsconfig.app.json
      # TODO: re-enable once the first *.spec.ts is added.
      # - name: Tests
      #   run: pnpm exec ng test --watch=false
