server {
    listen 4000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — every unknown route returns index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Angular fingerprints these — safe to cache aggressively
    location ~* \.(?:js|mjs|css|woff2?|ttf|svg|png|jpe?g|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # No cache on index.html so new deployments are picked up instantly
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
