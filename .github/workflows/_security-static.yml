name: Security (static)

on:
  workflow_call:

jobs:
  sast:
    name: SAST (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: [java-kotlin, javascript-typescript]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        if: matrix.language == 'java-kotlin'
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@65216971a11ded447a6b76263d5a144519e5eee1 # codeql-bundle-v2.25.2
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.language == 'java-kotlin' && 'manual' || 'none' }}

      - name: Build backend for CodeQL
        if: matrix.language == 'java-kotlin'
        working-directory: backend
        run: ./mvnw --batch-mode --no-transfer-progress -DskipTests package

      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@65216971a11ded447a6b76263d5a144519e5eee1 # codeql-bundle-v2.25.2
        with:
          category: "/language:${{ matrix.language }}"

  secrets:
    name: Secret scanning (gitleaks)
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: "8.21.2"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sfL -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks

      - name: Scan
        run: ./gitleaks detect --source . --redact --verbose --exit-code 1

  deps:
    name: Dependency scanning (OSV-Scanner)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run OSV-Scanner
        run: |
          curl -sSfL -o osv-scanner \
            https://github.com/google/osv-scanner/releases/download/v2.3.5/osv-scanner_linux_amd64
          chmod +x osv-scanner
          ./osv-scanner \
            --recursive \
            --lockfile=frontend/pnpm-lock.yaml \
            --lockfile=backend/pom.xml \
            --format=sarif \
            --output=osv-results.sarif \
            . || true
          ls -la osv-results.sarif

      - uses: github/codeql-action/upload-sarif@65216971a11ded447a6b76263d5a144519e5eee1 # codeql-bundle-v2.25.2
        if: always()
        with:
          sarif_file: osv-results.sarif
          category: osv-scanner

  iac:
    name: IaC scanning (tfsec)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: aquasecurity/tfsec-sarif-action@21ded20e8ca120cd9d3d6ab04ef746477542a608 # v0.1.4
        with:
          working_directory: infra
          sarif_file: tfsec-results.sarif

      - uses: github/codeql-action/upload-sarif@65216971a11ded447a6b76263d5a144519e5eee1 # codeql-bundle-v2.25.2
        if: always()
        with:
          sarif_file: tfsec-results.sarif
          category: tfsec

  dockerfiles:
    name: Dockerfile lint (hadolint)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    strategy:
      fail-fast: false
      matrix:
        dockerfile: [backend/Dockerfile, frontend/Dockerfile]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: ${{ matrix.dockerfile }}
          format: sarif
          output-file: hadolint-${{ strategy.job-index }}.sarif
          no-fail: true

      - uses: github/codeql-action/upload-sarif@65216971a11ded447a6b76263d5a144519e5eee1 # codeql-bundle-v2.25.2
        if: always()
        with:
          sarif_file: hadolint-${{ strategy.job-index }}.sarif
          category: hadolint-${{ strategy.job-index }}
