name: Deploy (Cloud Run)

on:
  workflow_call:
    inputs:
      region:
        required: true
        type: string
      ar_repo:
        required: true
        type: string
      backend_service:
        required: true
        type: string
      frontend_service:
        required: true
        type: string
    secrets:
      GCP_WIF_PROVIDER:
        required: true
      GCP_SA_EMAIL:
        required: true
      GCP_PROJECT_ID:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      REGION: ${{ inputs.region }}
      AR_REPO: ${{ inputs.ar_repo }}
      BACKEND_SERVICE: ${{ inputs.backend_service }}
      FRONTEND_SERVICE: ${{ inputs.frontend_service }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Deploy backend
        uses: google-github-actions/deploy-cloudrun@2028e2d7d30a78c6910e0632e48dd561b064884d # v3.0.0
        with:
          service: ${{ env.BACKEND_SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/backend:${{ github.sha }}

      - name: Deploy frontend
        uses: google-github-actions/deploy-cloudrun@2028e2d7d30a78c6910e0632e48dd561b064884d # v3.0.0
        with:
          service: ${{ env.FRONTEND_SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/frontend:${{ github.sha }}

      - name: Verify backend health
        env:
          SERVICE: ${{ env.BACKEND_SERVICE }}
        run: |
          URL=$(gcloud run services describe "$SERVICE" --region "$REGION" --format 'value(status.url)')
          echo "Probing $URL/api/actuator/health"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' "$URL/api/actuator/health" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Backend health OK"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying..."
            sleep 5
          done
          echo "Backend health check failed"
          exit 1

      - name: Verify frontend health
        env:
          SERVICE: ${{ env.FRONTEND_SERVICE }}
        run: |
          URL=$(gcloud run services describe "$SERVICE" --region "$REGION" --format 'value(status.url)')
          echo "Probing $URL"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' "$URL" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Frontend health OK"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying..."
            sleep 5
          done
          echo "Frontend health check failed"
          exit 1
